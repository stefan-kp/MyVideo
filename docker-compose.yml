services:
  myvideo:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./streams.json:/app/streams.json:ro
      - ./stream:/app/stream
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
